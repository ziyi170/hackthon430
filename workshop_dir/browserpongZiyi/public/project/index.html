<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>🏓 Pong</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0d0d0d;
      color: #fff;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      gap: 14px;
    }
    canvas {
      border: 2px solid #333;
      display: block;
    }
    #ui { text-align: center; }
    #message { font-size: 15px; color: #aaa; margin-bottom: 10px; min-height: 20px; }
    .btn-row { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
    button {
      background: #1a1a1a;
      color: #fff;
      border: 1px solid #444;
      padding: 9px 22px;
      cursor: pointer;
      font-family: monospace;
      font-size: 14px;
      border-radius: 4px;
      transition: background 0.15s;
    }
    button:hover { background: #2a2a2a; border-color: #666; }
    button.primary { border-color: #4af; color: #4af; }
    button.primary:hover { background: #0a2030; }
    #shareBox {
      display: none;
      margin-top: 10px;
      font-size: 13px;
      color: #888;
    }
    #shareBox input {
      background: #111;
      border: 1px solid #444;
      color: #4af;
      padding: 5px 8px;
      font-family: monospace;
      font-size: 12px;
      width: 320px;
      margin-right: 6px;
    }
    #shareBox button { padding: 5px 12px; font-size: 12px; }
    #seatBadge {
      display: inline-block;
      font-size: 12px;
      background: #111;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 2px 8px;
      color: #888;
      margin-top: 6px;
    }
  </style>
</head>
<body>
  <canvas id="canvas" width="800" height="600"></canvas>
  <div id="ui">
    <div id="message">Choose a game mode to start</div>
    <div class="btn-row" id="modeButtons">
      <button class="primary" onclick="chooseMode('single')">🤖 Single Player (vs AI)</button>
      <button class="primary" onclick="chooseMode('multi')">👥 Multiplayer (share link)</button>
    </div>
    <div id="shareBox">
      Share with Player 2:&nbsp;
      <input id="shareLink" readonly />
      <button onclick="copyLink()">Copy</button>
    </div>
    <div id="seatBadge" style="display:none"></div>
  </div>
  <script src="game.js"></script>
</body>
</html>
